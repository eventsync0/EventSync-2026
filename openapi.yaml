openapi: 3.0.0
info:
  title: EventSync API
  version: 1.0.0
  description: API de gestion des sessions et salles

servers:
  - url: http://localhost:3001

paths:
  /api/sessions:
    post:
      summary: Créer une session
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - roomId
                - title
                - description
                - startTime
                - endTime
                - capacity
                - speakerIds
              properties:
                roomId:
                  type: string
                  example: "uuid-room"
                title:
                  type: string
                  example: "Introduction au DDD"
                description:
                  type: string
                  example: "Une session sur le Domain Driven Design"
                startTime:
                  type: string
                  format: date-time
                  example: "2026-06-01T09:00:00.000Z"
                endTime:
                  type: string
                  format: date-time
                  example: "2026-06-01T10:00:00.000Z"
                capacity:
                  type: integer
                  example: 50
                speakerIds:
                  type: array
                  items:
                    type: string
                  example: ["uuid-speaker-1", "uuid-speaker-2"]
      responses:
        "201":
          description: Session créée
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "Session created"
                  data:
                    $ref: "#/components/schemas/Session"
        "400":
          description: Champs manquants ou aucun intervenant
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          description: Erreur serveur

  /api/sessions/{id}:
    put:
      summary: Mettre à jour une session
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          example: "uuid-session"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - roomId
                - title
                - description
                - startTime
                - endTime
                - capacity
                - speakerIds
              properties:
                roomId:
                  type: string
                  example: "uuid-room"
                title:
                  type: string
                  example: "Introduction au DDD - Mise à jour"
                description:
                  type: string
                  example: "Description mise à jour"
                startTime:
                  type: string
                  format: date-time
                  example: "2026-06-01T09:00:00.000Z"
                endTime:
                  type: string
                  format: date-time
                  example: "2026-06-01T10:00:00.000Z"
                capacity:
                  type: integer
                  example: 60
                speakerIds:
                  type: array
                  items:
                    type: string
                  example: ["uuid-speaker-1"]
      responses:
        "200":
          description: Session mise à jour
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "Session updated"
                  data:
                    $ref: "#/components/schemas/Session"
        "400":
          description: Champs manquants ou aucun intervenant
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          description: Erreur serveur

components:
  schemas:
    Session:
      type: object
      properties:
        id:
          type: string
        roomId:
          type: string
        title:
          type: string
        description:
          type: string
        startTime:
          type: string
          format: date-time
        endTime:
          type: string
          format: date-time
        capacity:
          type: integer
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        speakers:
          type: array
          items:
            type: object
            properties:
              id:
                type: string
              fullName:
                type: string

    Error:
      type: object
      properties:
        message:
          type: string